<style>
body {
  background: #000;
  color: #fff;
  font-family: sans-serif;
  margin: 0;
  padding-bottom: 100px;
}

.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  margin: 10px;
  padding: 10px;
  border-radius: 12px;
}

.link.active {
  border: 1px solid red;
}

.left {
  display: flex;
  align-items: center;
}

.thumb {
  width: 50px;
  height: 50px;
  margin-right: 10px;
  border-radius: 8px;
}

.icon {
  font-size: 18px;
  cursor: pointer;
}

#playerBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #181818;
  padding: 10px;
  display: none;
}

.player-top {
  display: flex;
  align-items: center;
}

.player-thumb {
  width: 40px;
  height: 40px;
  margin-right: 10px;
}

.player-info {
  flex: 1;
}

.player-title { font-size: 14px; }
.player-artist { font-size: 11px; color: #aaa; }

.player-btn {
  font-size: 20px;
  margin-left: 10px;
  cursor: pointer;
}

.progress {
  height: 4px;
  background: #333;
  margin-top: 8px;
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: red;
}
</style>
</head>
