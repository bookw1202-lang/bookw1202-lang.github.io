<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<style>
body {
  background: url("https://us.images.westend61.de/0001937078pw/a-bustling-nightclub-scene-illuminated-by-a-spectacular-light-show-with-vivid-red-hues-and-beams-shining-down-ADSF52712.jpg") no-repeat center center fixed;
  background-size: cover;
  color: red;
  font-family: sans-serif;
  margin: 0;
  padding-bottom: 260px;
}

#menu {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: 10px;
}
.menu-btn {
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  cursor: pointer;
  font-size: 13px;
}
.menu-btn.active { background: red; }

.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.9);
  margin: 8px;
  padding: 8px;
  border-radius: 16px;
}
.link.active {
  border: 2px solid red;
  box-shadow: 0 0 10px red;
}

.left {
  display: flex;
  align-items: center;
  flex: 1;
}

.thumb {
  width: 55px;
  height: 55px;
  border-radius: 10px;
  margin-right: 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#666;
  color:#000;
}

.play-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #111;
  color: #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.play-btn:hover { background:red; }

#playerBox {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 360px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  display:none;
}

#progressBar {
  height:6px;
  background:#ccc;
}
#progress {
  height:100%;
  width:0%;
  background:red;
}
</style>
</head>

<body>

<div id="menu">
  <div class="menu-btn active" onclick="switchMenu('all')">All Songs</div>
  <div class="menu-btn" onclick="switchMenu('youtube')">YouTube</div>
  <div class="menu-btn" onclick="switchMenu('niconico')">niconico</div>
  <div class="menu-btn" onclick="switchMenu('favorites')">⭐ お気に入り</div>
</div>

<div id="list"></div>

<div id="playerBox">
  <div id="player"></div>
  <div id="progressBar"><div id="progress"></div></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

let songs = [
{id:"bRQjhxXNyr4", type:"youtube", title:"夜の果て", artist:"ﾀﾗﾁｵ"},
{id:"k58Y3hvWVr4", type:"youtube", title:"HappySideDishes", artist:"ﾀﾗﾁｵ"},
{id:"yc0DN1byizo", type:"youtube", title:"いらないもの", artist:"伊東歌詞太郎×ﾀﾗﾁｵ"},
{id:"sm42423338", type:"niconico", title:"祝福", artist:"noristry×ﾀﾗﾁｵ×もるでお", duration:200},
{id:"TFcOOzbyy9Y", type:"youtube", title:"勿忘", artist:"あやん×ﾀﾗﾁｵ"},
{id:"HoD2SAGPHb8", type:"youtube", title:"点描の唄", artist:"あやん×ﾀﾗﾁｵ"}
];

let currentIndex = null;
let currentPlaying = null;
let isPlaying = false;
let player;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('player',{
    height:'200',
    width:'100%',
    events:{
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event){
  if(event.data === YT.PlayerState.ENDED){
    nextSong(); // 自動再生🔥
  }
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  songs.forEach((song,index)=>{
    let thumb = song.type==="youtube"
      ? `<img class="thumb" src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg">`
      : `<div class="thumb">nico</div>`;

    let isActive = currentPlaying === song.id;

    let btnIcon = (isActive && isPlaying) ? "⏸" : "▶";

    list.innerHTML += `
    <div class="link ${isActive?'active':''}">
      <div class="left">
        ${thumb}
        <div>
          <div>${song.title}</div>
          <div style="font-size:10px">${song.artist}</div>
        </div>
      </div>
      <div class="play-btn" onclick="togglePlay(${index})">${btnIcon}</div>
    </div>`;
  });
}

function togglePlay(index){
  let song = songs[index];

  if(currentIndex === index){
    if(isPlaying){
      player.pauseVideo();
      isPlaying = false;
    }else{
      player.playVideo();
      isPlaying = true;
    }
  }else{
    playSong(index);
  }
  render();
}

function playSong(index){
  currentIndex = index;
  let song = songs[index];
  currentPlaying = song.id;
  isPlaying = true;

  document.getElementById("playerBox").style.display="block";

  if(song.type==="youtube"){
    player.loadVideoById(song.id);
  }else{
    document.getElementById("player").innerHTML =
      `<iframe src="https://ext.nicovideo.jp/thumb_watch/${song.id}" width="100%" height="200"></iframe>`;
  }

  render();
}

function nextSong(){
  if(currentIndex === null) return;
  let next = currentIndex + 1;
  if(next >= songs.length) next = 0;
  playSong(next);
}

function switchMenu(menu){
  document.querySelectorAll('.menu-btn').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');

  if(menu==="all") songs = songs;
  if(menu==="youtube") songs = songs.filter(s=>s.type==="youtube");
  if(menu==="niconico") songs = songs.filter(s=>s.type==="niconico");

  render();
}

render();

</script>
</body>
</html>
