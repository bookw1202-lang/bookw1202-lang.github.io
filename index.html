<style>
body{background:#000;color:#fff;margin:0;font-family:sans-serif;}

#siteTitle{
  text-align:center;font-size:22px;margin:12px 0;
  font-weight:bold;letter-spacing:2px;
  font-family:Impact,sans-serif;
  text-shadow:0 0 5px #fff,0 0 10px red,0 0 20px red;
}

#menu{display:flex;justify-content:center;gap:6px;padding:10px;}
.menu-btn{padding:6px 8px;font-size:12px;background:#111;border-radius:8px;cursor:pointer;}
.menu-btn.active{background:red;}

select,input{
  display:block;margin:5px auto;padding:6px;width:90%;
  border-radius:6px;border:none;
}

.link{
  display:flex;justify-content:space-between;align-items:center;
  background:#fff;color:#000;margin:8px;padding:8px;border-radius:12px;
}
.link.active{border:2px solid red;}

.left{display:flex;align-items:center;}
.thumb{width:50px;height:50px;margin-right:10px;border-radius:10px;}

.play-btn{
  width:28px;height:28px;border-radius:50%;
  background:#111;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;
}

.fav-btn{margin-left:6px;cursor:pointer;}
.fav-btn.active{color:gold;}

#playerBox{
  position:fixed;bottom:0;width:100%;background:#111;
  display:none;text-align:center;
}

#controls{
  display:flex;justify-content:center;gap:10px;padding:6px;
}

.ctrl-btn{
  background:#222;color:#fff;padding:6px 10px;border-radius:6px;cursor:pointer;
}

iframe{width:100%;height:200px;border:none;}
</style>
</head>

/* ===== システム ===== */
let baseSongs=[...allSongs];
let songs=[...allSongs];
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");
let currentIndex=null;
let autoPlay=false;
let timer=null;

/* ===== フィルター ===== */
function populateFilter(){
  let aSel=document.getElementById("artistFilter");
  let tSel=document.getElementById("titleFilter");

  aSel.innerHTML='<option value="all">All Artists</option>';
  tSel.innerHTML='<option value="all">All Songs</option>';

  [...new Set(baseSongs.map(s=>s.artist))].forEach(a=>{
    aSel.innerHTML+=`<option>${a}</option>`;
  });

  [...new Set(baseSongs.map(s=>s.title))].forEach(t=>{
    tSel.innerHTML+=`<option>${t}</option>`;
  });
}

/* ===== 描画 ===== */
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  songs.forEach((s,i)=>{
    let key=s.id+s.title;
    let fav=favorites.includes(key)?"⭐":"☆";

    let thumb=s.type==="youtube"
      ? `<img class="thumb" src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg">`
      : `<img class="thumb" src="https://tn.smilevideo.jp/smile?i=${s.id.replace("sm","")}">`;

    list.innerHTML+=`
    <div class="link ${i===currentIndex?'active':''}">
      <div class="left">
        ${thumb}
        <div>
          <div>${s.title}</div>
          <div style="font-size:10px">${s.artist}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="play-btn" onclick="play(${i})">▶</div>
        <div class="fav-btn ${favorites.includes(key)?'active':''}" onclick="toggleFav('${key}')">${fav}</div>
      </div>
    </div>`;
  });
}

/* ===== 再生 ===== */
function play(i){
  let s=songs[i];

  if(s.type==="niconico"){
    window.open(`https://www.nicovideo.jp/watch/${s.id}`);
    return;
  }

  currentIndex=i;

  document.getElementById("playerBox").style.display="block";
  document.getElementById("nowPlaying").innerText=s.title+" / "+s.artist;

  document.getElementById("player").src=
    `https://www.youtube.com/embed/${s.id}?autoplay=1${s.start ? `&start=${s.start}` : ""}`;

  render();

  if(timer) clearTimeout(timer);

  if(autoPlay){
    timer=setTimeout(next,(s.length || 250)*1000);
  }
}

/* ===== 操作 ===== */
function next(){
  if(currentIndex===null)return;
  let nextIndex=(currentIndex+1)%songs.length;
  play(nextIndex);
}

function prev(){
  if(currentIndex===null)return;
  let prevIndex=(currentIndex-1+songs.length)%songs.length;
  play(prevIndex);
}

function toggleAuto(){
  autoPlay=!autoPlay;
  alert(autoPlay?"連続再生ON":"連続再生OFF");
}

/* ===== お気に入り ===== */
function toggleFav(key){
  if(favorites.includes(key)){
    favorites=favorites.filter(f=>f!==key);
  }else{
    favorites.push(key);
  }
  localStorage.setItem("favorites",JSON.stringify(favorites));
  render();
}

/* ===== メニュー ===== */
function switchMenu(type,e){
  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");

  if(type==="all") baseSongs=[...allSongs];
  if(type==="youtube") baseSongs=allSongs.filter(s=>s.type==="youtube");
  if(type==="niconico") baseSongs=allSongs.filter(s=>s.type==="niconico");
  if(type==="favorites") baseSongs=allSongs.filter(s=>favorites.includes(s.id+s.title));

  songs=[...baseSongs];
  populateFilter();
  render();
}

/* ===== 検索 ===== */
function filterSongs(){
  let word=document.getElementById("search").value.toLowerCase();
  let a=document.getElementById("artistFilter").value;
  let t=document.getElementById("titleFilter").value;

  songs=baseSongs.filter(s=>{
    return (s.title.toLowerCase().includes(word) || s.artist.toLowerCase().includes(word)) &&
           (a==="all"||s.artist===a) &&
           (t==="all"||s.title===t);
  });

  render();
}

populateFilter();
render();
