<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<style>
body {
  background: #000;
  color: red;
  font-family: sans-serif;
  text-align: center;
  padding: 15px;
}

h1 { margin-bottom: 10px; }

input {
  width: 80%;
  padding: 8px;
  margin: 6px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  background: red;
  color: white;
}

.section-title {
  margin-top: 20px;
}

.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #fff;
  color: #000;
  margin: 10px auto;
  padding: 10px;
  border-radius: 15px;
  max-width: 420px;
}

.left {
  display: flex;
  align-items: center;
  cursor: pointer;
}

.thumb {
  width: 50px;
  height: 50px;
  margin-right: 10px;
  border-radius: 10px;
}

.icon {
  cursor: pointer;
  margin-left: 5px;
}

#playerBox {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #fff;
  border-radius: 15px;
  display: none;
  padding: 10px;
}
</style>

</head>
<body>

<h1>Songs</h1>

<input id="search" placeholder="検索..." oninput="searchSongs()">

<h3>曲追加</h3>
<input id="title" placeholder="曲名">
<input id="artist" placeholder="アーティスト">
<input id="url" placeholder="YouTube URL">
<button onclick="addSong()">追加</button>

<h3>Favorites</h3>
<div id="favorites"></div>

<h3>All Songs</h3>
<div id="list"></div>

<div id="playerBox">
  <button onclick="closePlayer()">✕</button>
  <iframe id="player" width="100%" height="200"></iframe>
</div>
