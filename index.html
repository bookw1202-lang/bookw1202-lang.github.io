<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<style>
body {
  background: url("https://us.images.westend61.de/0001937078pw/a-bustling-nightclub-scene-illuminated-by-a-spectacular-light-show-with-vivid-red-hues-and-beams-shining-down-ADSF52712.jpg") no-repeat center;
  background-size: cover;
  margin:0;
  font-family:sans-serif;
}

/* メニュー */
#menu {
  display:flex;
  justify-content:center;
  gap:6px;
  padding:10px;
}
.menu-btn {
  padding:5px 8px;
  font-size:12px;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
.menu-btn.active { background:red; }

/* プルダウン */
#filter {
  display:block;
  margin:0 auto 10px;
  padding:6px;
  border-radius:6px;
}

/* 曲 */
.link {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  margin:8px;
  padding:8px;
  border-radius:12px;
}
.link.active {
  border:2px solid red;
  box-shadow:0 0 8px red;
}

.left {
  display:flex;
  align-items:center;
  flex:1;
}

.thumb {
  width:50px;
  height:50px;
  margin-right:10px;
  border-radius:10px;
  background:#666;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#000;
}

/* ▶丸 */
.play-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.play-btn:hover { background:red; }

/* ⭐お気に入り */
.fav-btn {
  margin-left:6px;
  font-size:16px;
  cursor:pointer;
}
.fav-btn.active {
  color:gold;
}

/* プレイヤー */
#playerBox {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:360px;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  display:none;
}
#progressBar { height:6px; background:#ccc; }
#progress { height:100%; width:0; background:red; }
</style>
</head>

<body>

<div id="menu">
  <div class="menu-btn active" onclick="switchMenu('all',event)">All Songs</div>
  <div class="menu-btn" onclick="switchMenu('youtube',event)">YouTube</div>
  <div class="menu-btn" onclick="switchMenu('niconico',event)">niconico</div>
  <div class="menu-btn" onclick="switchMenu('favorites',event)">⭐ お気に入り</div>
</div>

<select id="filter" onchange="filterSongs()">
  <option value="all">All</option>
</select>

<div id="list"></div>

<div id="playerBox">
  <div id="player"></div>
  <div id="progressBar"><div id="progress"></div></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

let allSongs = [
{id:"bRQjhxXNyr4", type:"youtube", title:"夜の果て", artist:"ﾀﾗﾁｵ"},
{id:"k58Y3hvWVr4", type:"youtube", title:"HappySideDishes", artist:"ﾀﾗﾁｵ"},
{id:"yc0DN1byizo", type:"youtube", title:"いらないもの", artist:"伊東歌詞太郎×ﾀﾗﾁｵ"},
{id:"sm42423338", type:"niconico", title:"祝福", artist:"noristry×ﾀﾗﾁｵ×もるでお", duration:200},
{id:"TFcOOzbyy9Y", type:"youtube", title:"勿忘", artist:"あやん×ﾀﾗﾁｵ"},
{id:"HoD2SAGPHb8", type:"youtube", title:"点描の唄", artist:"あやん×ﾀﾗﾁｵ"}
];

let songs = [...allSongs];
let favorites = JSON.parse(localStorage.getItem("favorites")||"[]");

let currentIndex=null, isPlaying=false, player;

function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{events:{onStateChange:e=>{if(e.data===0)nextSong();}}});
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  songs.forEach((s,i)=>{
    let thumb = s.type==="youtube"
      ? `<img class="thumb" src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg">`
      : `<div class="thumb">nico</div>`;

    let icon = (i===currentIndex && isPlaying) ? "⏸" : "▶";
    let favClass = favorites.includes(s.id) ? "active" : "";

    list.innerHTML+=`
    <div class="link ${i===currentIndex?'active':''}">
      <div class="left">
        ${thumb}
        <div>
          <div>${s.title}</div>
          <div style="font-size:10px">${s.artist}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;">
        <div class="play-btn" onclick="togglePlay(${i})">${icon}</div>
        <div class="fav-btn ${favClass}" onclick="toggleFavorite('${s.id}')">⭐</div>
      </div>
    </div>`;
  });
}

function toggleFavorite(id){
  if(favorites.includes(id)){
    favorites = favorites.filter(f=>f!==id);
  }else{
    favorites.push(id);
  }
  localStorage.setItem("favorites",JSON.stringify(favorites));
  render();
}

function togglePlay(i){
  if(currentIndex===i){
    if(isPlaying){ player.pauseVideo(); isPlaying=false;}
    else{ player.playVideo(); isPlaying=true;}
  }else playSong(i);
  render();
}

function playSong(i){
  currentIndex=i;
  isPlaying=true;
  document.getElementById("playerBox").style.display="block";
  let s=songs[i];

  if(s.type==="youtube") player.loadVideoById(s.id);
  else document.getElementById("player").innerHTML=
    `<iframe src="https://ext.nicovideo.jp/thumb_watch/${s.id}" width="100%" height="200"></iframe>`;

  render();
}

function nextSong(){
  if(currentIndex===null)return;
  let next=(currentIndex+1)%songs.length;
  playSong(next);
}

function switchMenu(type,e){
  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");

  if(type==="all") songs=[...allSongs];
  if(type==="youtube") songs=allSongs.filter(s=>s.type==="youtube");
  if(type==="niconico") songs=allSongs.filter(s=>s.type==="niconico");
  if(type==="favorites") songs=allSongs.filter(s=>favorites.includes(s.id));

  populateFilter();
  render();
}

function populateFilter(){
  let select=document.getElementById("filter");
  select.innerHTML='<option value="all">All</option>';
  let set=new Set();
  songs.forEach(s=>set.add(s.artist));
  set.forEach(a=>{
    let opt=document.createElement("option");
    opt.value=a;
    opt.textContent=a;
    select.appendChild(opt);
  });
}

function filterSongs(){
  let val=document.getElementById("filter").value;
  if(val==="all") return render();
  songs = allSongs.filter(s=>s.artist===val);
  render();
}

populateFilter();
render();

</script>
</body>
</html>
