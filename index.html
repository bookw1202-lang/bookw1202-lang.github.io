<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: sans-serif;
  margin: 0;
  padding-bottom: 100px;
}

.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  margin: 10px;
  padding: 10px;
  border-radius: 12px;
}

.link.active {
  border: 1px solid red;
}

.left {
  display: flex;
  align-items: center;
}

.thumb {
  width: 50px;
  height: 50px;
  margin-right: 10px;
  border-radius: 8px;
}

.icon {
  font-size: 18px;
  cursor: pointer;
}

#playerBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #181818;
  padding: 10px;
  display: none;
}

.player-top {
  display: flex;
  align-items: center;
}

.player-thumb {
  width: 40px;
  height: 40px;
  margin-right: 10px;
}

.player-info {
  flex: 1;
}

.player-title { font-size: 14px; }
.player-artist { font-size: 11px; color: #aaa; }

.player-btn {
  font-size: 20px;
  margin-left: 10px;
  cursor: pointer;
}

.progress {
  height: 4px;
  background: #333;
  margin-top: 8px;
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: red;
}
</style>
</head>

<body>

<div id="list"></div>

<div id="playerBar">
  <div class="player-top">
    <img id="pThumb" class="player-thumb">
    <div class="player-info">
      <div id="pTitle" class="player-title"></div>
      <div id="pArtist" class="player-artist"></div>
    </div>
    <div class="player-btn" onclick="togglePlay()">⏸</div>
  </div>
  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>
  <iframe id="player" width="0" height="0" allow="autoplay" frameborder="0"></iframe>
</div>

<script>
let songs = [
  {id:"bRQjhxXNyr4", title:"夜の果て", artist:"ﾀﾗﾁｵ"},
  {id:"k58Y3hvWVr4", title:"HappySideDishes", artist:"ﾀﾗﾁｵ"},
  {id:"yc0DN1byizo", title:"いらないもの", artist:"伊東歌詞太郎×ﾀﾗﾁｵ"}
];

let currentId = null;
let isPlaying = false;
let progress = 0;
let interval = null;

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  songs.forEach(song => {
    list.innerHTML += `
    <div class="link" data-id="${song.id}">
      <div class="left">
        <img class="thumb" src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg">
        <div>
          <div>${song.title}</div>
          <div style="font-size:10px">${song.artist}</div>
        </div>
      </div>
      <div class="icon" onclick="playSong('${song.id}')">▶</div>
    </div>`;
  });
}

function playSong(id) {
  const song = songs.find(s => s.id === id);
  document.getElementById("playerBar").style.display = "block";

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id + "?autoplay=1";

  document.getElementById("pThumb").src =
    "https://img.youtube.com/vi/" + id + "/mqdefault.jpg";
  document.getElementById("pTitle").textContent = song.title;
  document.getElementById("pArtist").textContent = song.artist;

  currentId = id;
  isPlaying = true;

  document.querySelectorAll(".link").forEach(el => el.classList.remove("active"));
  document.querySelector(`[data-id="${id}"]`).classList.add("active");

  startProgress();
}

function togglePlay() {
  const player = document.getElementById("player");
  if (!currentId) return;

  if (isPlaying) {
    player.src = "";
    isPlaying = false;
    clearInterval(interval);
  } else {
    player.src = "https://www.youtube.com/embed/" + currentId + "?autoplay=1";
    isPlaying = true;
    startProgress();
  }
}

function startProgress() {
  clearInterval(interval);
  progress = 0;
  interval = setInterval(() => {
    progress += 1;
    document.getElementById("progressBar").style.width = progress + "%";
    if (progress >= 100) clearInterval(interval);
  }, 1000);
}

render();
</script>

</body>
</html>
