<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<style>
body {
  background: url("https://us.images.westend61.de/0001937078pw/a-bustling-nightclub-scene-illuminated-by-a-spectacular-light-show-with-vivid-red-hues-and-beams-shining-down-ADSF52712.jpg") no-repeat center;
  background-size: cover;
  margin:0;
  font-family:sans-serif;
}

/* メニュー */
#menu {
  display:flex;
  justify-content:center;
  gap:6px;
  padding:10px;
}
.menu-btn {
  padding:5px 8px;
  font-size:12px;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}
.menu-btn.active { background:red; }

/* プルダウン */
#filter {
  display:block;
  margin:0 auto 10px;
  padding:6px;
  border-radius:6px;
}

/* 曲 */
.link {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  margin:8px;
  padding:8px;
  border-radius:12px;
}
.link.active {
  border:2px solid red;
  box-shadow:0 0 8px red;
}

.left {
  display:flex;
  align-items:center;
  flex:1;
}

.thumb {
  width:50px;
  height:50px;
  margin-right:10px;
  border-radius:10px;
  background:#666;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#000;
}

/* ▶丸 */
.play-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.play-btn:hover { background:red; }

/* ⭐ */
.fav-btn {
  margin-left:6px;
  font-size:16px;
  cursor:pointer;
}
.fav-btn.active { color:gold; }

/* プレイヤー */
#playerBox {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:360px;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  display:none;
}

/* 曲情報 */
#nowPlaying {
  padding:6px;
  font-size:12px;
  text-align:center;
  background:#111;
  color:#fff;
}

#progressBar { height:6px; background:#ccc; }
#progress { height:100%; width:0; background:red; }
</style>
</head>

<body>

<div id="menu">
  <div class="menu-btn active" onclick="switchMenu('all',event)">All Songs</div>
  <div class="menu-btn" onclick="switchMenu('youtube',event)">YouTube</div>
  <div class="menu-btn" onclick="switchMenu('niconico',event)">niconico</div>
  <div class="menu-btn" onclick="switchMenu('favorites',event)">⭐ お気に入り</div>
</div>

<select id="filter" onchange="filterSongs()">
  <option value="all">All</option>
</select>

<div id="list"></div>

<div id="playerBox">

  <div id="ytPlayer"></div>
  <iframe id="nicoPlayer" style="display:none;" width="100%" height="200"></iframe>

  <div id="progressBar"><div id="progress"></div></div>
</div>
