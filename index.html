<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<style>
body {
  background:#000;
  color:#fff;
  margin:0;
  font-family:sans-serif;
}

/* メニュー */
#menu {
  display:flex;
  justify-content:center;
  gap:6px;
  padding:10px;
}
.menu-btn {
  padding:6px 8px;
  font-size:12px;
  background:#111;
  border-radius:8px;
  cursor:pointer;
}
.menu-btn.active { background:red; }

/* 曲 */
.link {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  color:#000;
  margin:8px;
  padding:8px;
  border-radius:12px;
}
.link.active {
  border:2px solid red;
}

/* 左 */
.left {
  display:flex;
  align-items:center;
}
.thumb {
  width:50px;
  height:50px;
  margin-right:10px;
  border-radius:10px;
  background:#666;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ▶ */
.play-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* ⭐ */
.fav-btn {
  margin-left:6px;
  cursor:pointer;
}
.fav-btn.active { color:gold; }

/* プレイヤー */
#playerBox {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:none;
}

#nowPlaying {
  text-align:center;
  font-size:12px;
  padding:6px;
}

/* 動画 */
iframe {
  width:100%;
  height:200px;
  border:none;
}
</style>
</head>

<body>

<div id="menu">
  <div class="menu-btn active" onclick="switchMenu('all',event)">All Songs</div>
  <div class="menu-btn" onclick="switchMenu('youtube',event)">YouTube</div>
  <div class="menu-btn" onclick="switchMenu('niconico',event)">niconico</div>
  <div class="menu-btn" onclick="switchMenu('favorites',event)">⭐ お気に入り</div>
</div>

<div id="list"></div>

<div id="playerBox">
  <div id="nowPlaying">再生中：---</div>
  <iframe id="player"></iframe>
</div>

<script>

let allSongs = [
{id:"bRQjhxXNyr4", type:"youtube", title:"夜の果て", artist:"ﾀﾗﾁｵ"},
{id:"k58Y3hvWVr4", type:"youtube", title:"HappySideDishes", artist:"ﾀﾗﾁｵ"},
{id:"yc0DN1byizo", type:"youtube", title:"いらないもの", artist:"伊東歌詞太郎×ﾀﾗﾁｵ"},
{id:"sm42423338", type:"niconico", title:"祝福", artist:"noristry×ﾀﾗﾁｵ×もるでお"},
{id:"TFcOOzbyy9Y", type:"youtube", title:"勿忘", artist:"あやん×ﾀﾗﾁｵ"},
{id:"HoD2SAGPHb8", type:"youtube", title:"点描の唄", artist:"あやん×ﾀﾗﾁｵ"}
];

let songs=[...allSongs];
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");
let currentIndex=null;

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  songs.forEach((s,i)=>{
    let thumb = s.type==="youtube"
      ? `<img class="thumb" src="https://img.youtube.com/vi/${s.id}/mqdefault.jpg">`
      : `<div class="thumb">nico</div>`;

    let fav = favorites.includes(s.id)?"active":"";

    list.innerHTML+=`
    <div class="link ${i===currentIndex?'active':''}">
      <div class="left">
        ${thumb}
        <div>
          <div>${s.title}</div>
          <div style="font-size:10px">${s.artist}</div>
        </div>
      </div>
      <div style="display:flex;">
        <div class="play-btn" onclick="play(${i})">▶</div>
        <div class="fav-btn ${fav}" onclick="toggleFav('${s.id}')">⭐</div>
      </div>
    </div>`;
  });
}

function play(i){
  currentIndex=i;
  let s=songs[i];

  let player=document.getElementById("player");
  document.getElementById("playerBox").style.display="block";
  document.getElementById("nowPlaying").innerText="再生中："+s.title+" / "+s.artist;

  if(s.type==="youtube"){
    player.src=`https://www.youtube.com/embed/${s.id}?autoplay=1`;
  }else{
    player.src=`https://ext.nicovideo.jp/thumb_watch/${s.id}`;
  }

  render();
}

function toggleFav(id){
  if(favorites.includes(id)){
    favorites=favorites.filter(f=>f!==id);
  }else{
    favorites.push(id);
  }
  localStorage.setItem("favorites",JSON.stringify(favorites));
  render();
}

function switchMenu(type,e){
  document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");

  if(type==="all") songs=[...allSongs];
  if(type==="youtube") songs=allSongs.filter(s=>s.type==="youtube");
  if(type==="niconico") songs=allSongs.filter(s=>s.type==="niconico");
  if(type==="favorites") songs=allSongs.filter(s=>favorites.includes(s.id));

  render();
}

render();

</script>
</body>
</html>
