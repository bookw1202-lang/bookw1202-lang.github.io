<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songs</title>

<style>
body {
  background: black;
  color: red;
  font-family: sans-serif;
  margin:0;
}

/* メニュー */
#menu {
  display:flex;
  justify-content:center;
  gap:6px;
  padding:10px;
}
.menu-btn {
  padding:5px 8px;
  font-size:12px;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
  white-space:nowrap;
}
.menu-btn.active { background:red; }

/* プルダウン */
#filter {
  display:block;
  margin:0 auto 10px;
  padding:6px;
}

/* 曲 */
.link {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  color:#000;
  margin:8px;
  padding:8px;
  border-radius:12px;
}
.link.active {
  border:2px solid red;
}

.left {
  display:flex;
  align-items:center;
  flex:1;
}

.thumb {
  width:50px;
  height:50px;
  margin-right:10px;
  border-radius:10px;
  background:#666;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ▶ */
.play-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.play-btn:hover { background:red; }

/* ⭐ */
.fav-btn {
  margin-left:6px;
  cursor:pointer;
}
.fav-btn.active { color:gold; }

/* プレイヤー */
#playerBox {
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:360px;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  display:none;
}

#nowPlaying {
  background:#111;
  color:#fff;
  text-align:center;
  padding:5px;
  font-size:12px;
}

#ytPlayer { width:100%; height:200px; }
#nicoPlayer { width:100%; height
